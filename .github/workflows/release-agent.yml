name: Release Agent Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # attach binaries to the GitHub Release

env:
  GO_VERSION: "1.25"
  AGENT_RELEASES_BUCKET: silkstrand-agent-releases
  S3_ENDPOINT: https://s3.ng20.org
  # Customer agent image: public zot ingress (agents run in customer networks).
  AGENT_IMAGE_REGISTRY: zot.ng20.org

jobs:
  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd agent
          go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o ../silkstrand-agent-${{ matrix.suffix }} \
            ./cmd/silkstrand-agent/

      - name: Generate checksum
        run: sha256sum silkstrand-agent-${{ matrix.suffix }} > silkstrand-agent-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.suffix }}
          path: |
            silkstrand-agent-${{ matrix.suffix }}
            silkstrand-agent-${{ matrix.suffix }}.sha256

  publish-release:
    name: Attach Agent Binaries to Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      # Checkout first — download-artifact puts files in the workspace and
      # actions/checkout wipes it, so ordering matters.
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          merge-multiple: true

      - name: Set up MinIO client (mc)
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set silkstrand "${S3_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

      - name: Upload binaries to MinIO (versioned + latest)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Versioned folder — immutable.
          mc cp silkstrand-agent-* "silkstrand/${AGENT_RELEASES_BUCKET}/${VERSION}/"
          # latest/ is rewritten every release — set no-cache so the Cloudflare
          # edge serves the new binary immediately instead of a stale one.
          mc cp --attr "Cache-Control=no-cache,max-age=0" \
            silkstrand-agent-* "silkstrand/${AGENT_RELEASES_BUCKET}/latest/"
          # install.sh is also rewritten every release — same treatment, plus
          # a shell content-type.
          mc cp --attr "Cache-Control=no-cache,max-age=0;Content-Type=text/x-shellscript" \
            scripts/install-agent.sh "silkstrand/${AGENT_RELEASES_BUCKET}/install.sh"
          # latest/VERSION — the concrete version the API reads to surface an
          # "update available" hint. Strip the leading "v" so it matches the
          # agent's ldflags main.version (built from ${GITHUB_REF#refs/tags/v}),
          # otherwise up-to-date agents would compare unequal. no-cache like latest/.
          printf '%s' "${VERSION#v}" | mc pipe --attr "Cache-Control=no-cache,max-age=0" \
            "silkstrand/${AGENT_RELEASES_BUCKET}/latest/VERSION"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            silkstrand-agent-*

  build-push-image:
    name: Build & Push Agent Container Image
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to zot
        env:
          ZOT_USERNAME: ${{ secrets.ZOT_USERNAME }}
          ZOT_PASSWORD: ${{ secrets.ZOT_PASSWORD }}
        run: echo "${ZOT_PASSWORD}" | docker login "${AGENT_IMAGE_REGISTRY}" -u "${ZOT_USERNAME}" --password-stdin

      - name: Build and push agent image
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          IMAGE_TAG="${{ env.AGENT_IMAGE_REGISTRY }}/silkstrand-agent:v${VERSION}"
          IMAGE_LATEST="${{ env.AGENT_IMAGE_REGISTRY }}/silkstrand-agent:latest"
          docker build --build-arg VERSION="v${VERSION}" \
            -t "${IMAGE_TAG}" -t "${IMAGE_LATEST}" \
            -f agent/Dockerfile agent/
          docker push "${IMAGE_TAG}"
          docker push "${IMAGE_LATEST}"
